kind = "web"
previewPath = "/"
title = "HMAS Intranet"
version = "1.0.0"
id = "artifacts/hmas-intranet"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18711

[services.development]
run = "pnpm --filter @workspace/hmas-intranet run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hmas-intranet", "run", "build" ]
publicDir = "artifacts/hmas-intranet/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18711"
BASE_PATH = "/"
